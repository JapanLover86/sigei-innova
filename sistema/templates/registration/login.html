{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEI Innova | Iniciar sesión</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="login-page">
    <main class="container min-vh-100 d-flex align-items-center justify-content-center">
        <section class="card shadow-lg border-0 login-card">
            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold text-primary mb-2">SIGEI Innova</h1>
                    <p class="text-muted mb-0">
                        Sistema Inteligente de Gestión de Inventario
                    </p>
                </div>

                {% if form.errors %}
                    <div class="alert alert-danger">
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">
                            Usuario
                        </label>
                        <input
                            type="text"
                            name="username"
                            id="id_username"
                            class="form-control"
                            placeholder="Ingrese su usuario"
                            required
                            autofocus
                        >
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">
                            Contraseña
                        </label>
                        <input
                            type="password"
                            name="password"
                            id="id_password"
                            class="form-control"
                            placeholder="Ingrese su contraseña"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Iniciar sesión
                    </button>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    Ferretería Innova · Huancayo 2026
                </p>
            </div>
        </section>
    </main>
</body>
</html>
